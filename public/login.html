<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login — PTML</title>
<link rel="stylesheet" href="design-system.css">
<style>
.auth-page { min-height:100vh; display:flex; align-items:center; justify-content:center; padding:24px; }
.auth-card { width:100%; max-width:400px; background:var(--c-surface); border:1px solid var(--c-border);
  border-radius:var(--radius-lg); padding:40px; box-shadow:var(--shadow); }
.auth-logo { font-size:24px; font-weight:800; letter-spacing:-0.03em; margin-bottom:4px; }
.auth-subtitle { color:var(--c-text-3); font-size:14px; margin-bottom:32px; }
.auth-card h2 { font-size:20px; font-weight:700; margin-bottom:24px; }
.form-group { margin-bottom:16px; }
.form-group label { display:block; margin-bottom:4px; font-size:13px; font-weight:500; color:var(--c-text-2); }
.auth-footer { margin-top:24px; text-align:center; font-size:13px; color:var(--c-text-3); }
.auth-footer a { color:var(--c-accent); cursor:pointer; }
.msg { font-size:13px; padding:10px; border-radius:var(--radius); margin-bottom:16px; display:none; }
.msg.show { display:block; }
.msg.error { background:#fef2f2; color:var(--c-red); border:1px solid #fecaca; }
.msg.success { background:#f0fdf4; color:var(--c-green); border:1px solid #bbf7d0; }
</style>
</head>
<body>
<div class="auth-page">
  <div class="auth-card" id="auth-card">
    <div class="auth-logo">PTML</div>
    <div class="auth-subtitle">HTML presentations for the post-PPTX era</div>

    <div id="login-form">
      <h2>Sign in</h2>
      <div class="msg" id="msg"></div>
      <div class="form-group">
        <label for="email">Email</label>
        <input class="input" id="email" type="email" placeholder="you@example.com" autocomplete="email">
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <input class="input" id="password" type="password" placeholder="···" autocomplete="current-password">
      </div>
      <button class="btn btn-primary w-full" onclick="doLogin()" style="width:100%;justify-content:center;padding:10px">Sign in</button>
      <div class="auth-footer">
        Don't have an account? <a onclick="showSignup()">Create one</a>
      </div>
    </div>

    <div id="signup-form" style="display:none">
      <h2>Create account</h2>
      <div class="msg" id="msg2"></div>
      <div class="form-group">
        <label for="signup-name">Name</label>
        <input class="input" id="signup-name" type="text" placeholder="Your name">
      </div>
      <div class="form-group">
        <label for="signup-email">Email</label>
        <input class="input" id="signup-email" type="email" placeholder="you@example.com">
      </div>
      <div class="form-group">
        <label for="signup-password">Password</label>
        <input class="input" id="signup-password" type="password" placeholder="Min 6 characters">
      </div>
      <button class="btn btn-primary w-full" onclick="doSignup()" style="width:100%;justify-content:center;padding:10px">Create account</button>
      <div class="auth-footer">
        Already have an account? <a onclick="showLogin()">Sign in</a>
      </div>
    </div>
  </div>
</div>

<script src="../src/client/ptml-client.js"></script>
<script>
function showMsg(id, text, type) {
  var el = document.getElementById(id);
  el.textContent = text;
  el.className = 'msg show ' + (type || 'error');
  setTimeout(function() { el.className = 'msg'; }, 4000);
}

function showSignup() {
  document.getElementById('login-form').style.display = 'none';
  document.getElementById('signup-form').style.display = 'block';
}

function showLogin() {
  document.getElementById('signup-form').style.display = 'none';
  document.getElementById('login-form').style.display = 'block';
}

function doLogin() {
  var email = document.getElementById('email').value.trim();
  var password = document.getElementById('password').value.trim();
  if (!email || !password) {
    showMsg('msg', 'Please enter email and password.', 'error');
    return;
  }
  // Simulated auth — accepts any email with password 6+ chars
  if (password.length < 6) {
    showMsg('msg', 'Invalid credentials.', 'error');
    return;
  }
  PTMLClient.setUser({ id: 'user_' + email.replace(/[^a-z0-9]/g,''), plan: 'free', name: email.split('@')[0], email: email });
  window.location.href = 'dashboard.html';
}

function doSignup() {
  var name = document.getElementById('signup-name').value.trim();
  var email = document.getElementById('signup-email').value.trim();
  var password = document.getElementById('signup-password').value.trim();
  if (!name || !email || !password) {
    showMsg('msg2', 'All fields are required.', 'error');
    return;
  }
  if (password.length < 6) {
    showMsg('msg2', 'Password must be at least 6 characters.', 'error');
    return;
  }
  PTMLClient.setUser({ id: 'user_' + email.replace(/[^a-z0-9]/g,''), plan: 'free', name: name, email: email });
  window.location.href = 'dashboard.html';
}

// Check if already logged in
if (PTMLClient.getUser()) {
  window.location.href = 'dashboard.html';
}
</script>
</body>
</html>
