<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PTML Viewer</title>
  <link rel="stylesheet" href="design-system.css">
  <style>
    .viewer-page { min-height:100vh; display:flex; align-items:center; justify-content:center; padding:24px; }
    .viewer-card { width:100%; max-width:640px; background:var(--c-surface);
      border:1px solid var(--c-border); border-radius:var(--radius-lg);
      padding:40px; box-shadow:var(--shadow); }
    .logo { font-size:2rem; font-weight:900; letter-spacing:-0.03em; color:var(--c-text);
      margin-bottom:4px; }
    .subtitle { color:var(--c-text-2); font-size:1rem; margin-bottom:32px; }
    .input-row { display:flex; gap:8px; margin-bottom:12px; }
    .input-row .input { flex:1; }
    .hint { color:var(--c-text-3); font-size:0.85rem; margin-top:4px; margin-bottom:24px; }
    .examples h3 { font-size:0.9rem; color:var(--c-text-2); margin-bottom:12px; font-weight:500; }
    .example-list { display:flex; flex-direction:column; gap:8px; }
    .example-item {
      display:flex; align-items:center; justify-content:space-between;
      padding:14px 18px; border:1px solid var(--c-border);
      border-radius:var(--radius); text-decoration:none; color:var(--c-text);
      transition:all 0.15s var(--ease); cursor:pointer; background:var(--c-surface);
    }
    .example-item:hover { border-color:var(--c-accent); background:var(--c-accent-subtle); }
    .example-name { font-weight:600; }
    .example-meta { font-size:0.85rem; color:var(--c-text-3); }
    .error { color:var(--c-red); font-size:0.9rem; margin-top:12px; display:none;
      padding:10px 12px; background:#fef2f2; border:1px solid #fecaca;
      border-radius:var(--radius); }
  </style>
</head>
<body>
  <div class="viewer-page">
    <div class="viewer-card">
      <div class="logo">PTML</div>
      <p class="subtitle">Viewer — load any PTML markdown deck</p>

      <div class="input-row">
        <input class="input" type="text" id="deck-url" placeholder="path/to/deck.md or URL" value="">
        <button class="btn btn-primary" onclick="loadDeck()">Open Deck</button>
      </div>
      <p class="hint">Enter a .md file path or URL. The viewer will parse and render it live.</p>
      <div class="error" id="error"></div>

      <div class="examples" id="examples">
        <h3>Example Decks</h3>
        <div class="example-list" id="example-list"></div>
      </div>
    </div>
  </div>

  <script src="src/parser/ptml-parser.js"></script>
  <script src="src/parser/ptml-loader.js"></script>
  <script>
    // Auto-detect URL parameters: ?deck=path.md or ?data=base64markdown
    var params = new URLSearchParams(location.search);
    var deckParam = params.get('deck');
    var dataParam = params.get('data');

    // Load example list — all .md files, clicked to load in-viewer (not navigate away)
    var examples = [
      { name: 'PTML Overview', file: 'examples/ptml-overview.md', desc: '5 slides — cover, features, roadmap, pricing, CTA' },
      { name: 'Code Showcase', file: 'examples/code-showcase.md', desc: 'Developer-focused with code blocks (4 slides)' },
      { name: 'Minimal Deck', file: 'examples/minimal-deck.md', desc: 'Clean, no directives, auto-layout (4 slides)' },
    ];
    var list = document.getElementById('example-list');
    examples.forEach(function(ex) {
      var a = document.createElement('a');
      a.className = 'example-item';
      a.href = 'viewer.html?deck=' + encodeURIComponent(ex.file);
      a.innerHTML = '<span class="example-name">' + ex.name + '</span><span class="example-meta">' + ex.desc + '</span>';
      list.appendChild(a);
    });

    if (dataParam) {
      // Shared deck: base64-encoded markdown in the URL
      try {
        var md = decodeURIComponent(escape(atob(dataParam)));
        var parsed = PTML.parse(md);
        var html = PTML.buildHTML(parsed, { basePath: 'src/engine' });
        document.open();
        document.write(html);
        document.close();
        // Load runtime scripts
        var s1 = document.createElement('script');
        s1.src = 'src/engine/runtime.js';
        s1.onload = function() {
          var s2 = document.createElement('script');
          s2.src = 'src/engine/animations/fx-runtime.js';
          s2.onload = function() {
            window.dispatchEvent(new Event('DOMContentLoaded'));
          };
          document.head.appendChild(s2);
        };
        document.head.appendChild(s1);
      } catch (e) {
        var errEl = document.getElementById('error');
        errEl.textContent = 'Failed to decode shared deck: ' + e.message;
        errEl.style.display = 'block';
      }
    } else if (deckParam) {
      document.getElementById('deck-url').value = deckParam;
      loadDeck();
    }

    function loadDeck() {
      var url = document.getElementById('deck-url').value.trim();
      var errEl = document.getElementById('error');
      errEl.style.display = 'none';

      if (!url) { errEl.textContent = 'Please enter a deck path or URL.'; errEl.style.display = 'block'; return; }

      // Use PTML loader to render inline
      PTMLLoader.loadDeck(url, document.documentElement, {
        basePath: 'src/engine'
      });
    }
  </script>
</body>
</html>
